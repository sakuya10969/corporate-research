services:
  db:
    image: pgvector/pgvector:pg17
    container_name: corporate-research
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: corporate-research
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d corporate-research"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
